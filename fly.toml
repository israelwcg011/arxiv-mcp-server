# fly.toml app configuration file generated for arxiv-mcp-server on 2026-06-11T04:31:25Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'arxiv-mcp-server'
primary_region = 'gru'

[build]

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 256
